name: Forward remediation issue

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue:
        description: Issue number to forward
        required: true

permissions:
  issues: read
  contents: read

jobs:
  forward:
    runs-on: ubuntu-latest
    steps:
      - name: Forward eligible issue to remediator
        uses: actions/github-script@v7
        env:
          WORKFLOW_ISSUE: ${{ inputs.issue }}
          REMEDIATOR_REPO: ${{ vars.REMEDIATOR_REPO }}
          DEVIN_REPO_URL: ${{ vars.DEVIN_REPO_URL }}
        with:
          github-token: ${{ secrets.REMEDIATOR_GITHUB_TOKEN }}
          script: |
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(process.env.WORKFLOW_ISSUE)
              : context.payload.issue.number;
            const sourceOwner = context.repo.owner;
            const sourceRepo = context.repo.repo;
            const { data: issue } = await github.rest.issues.get({
              owner: sourceOwner,
              repo: sourceRepo,
              issue_number: issueNumber,
            });
            const labels = issue.labels.map(label =>
              typeof label === 'string' ? label : label.name,
            );
            const has = name => labels.includes(name);
            const alreadyDispatched = (issue.body || '').includes('remediator:devin_session=');
            const eligible = has('devin:eligible') && has('state:detected');
            if (!eligible || alreadyDispatched) {
              core.notice(
                `not forwarding issue #${issueNumber}: ` +
                `eligible=${eligible}; alreadyDispatched=${alreadyDispatched}`,
              );
              return;
            }

            const [remediatorOwner, remediatorRepo] = process.env.REMEDIATOR_REPO.split('/');
            await github.rest.repos.createDispatchEvent({
              owner: remediatorOwner,
              repo: remediatorRepo,
              event_type: 'remediation_issue_opened',
              client_payload: {
                target_owner: sourceOwner,
                target_repo: sourceRepo,
                issue_number: issueNumber,
                issue_url: issue.html_url,
                devin_repo_url: process.env.DEVIN_REPO_URL,
              },
            });
            core.notice(
              `forwarded issue #${issueNumber} to ${process.env.REMEDIATOR_REPO}`,
            );
