name: Devin remediation on issue

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue:
        description: Issue number to dispatch
        required: true
      confirm_live:
        description: Create a real Devin session
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: devin-remediation-${{ github.event.issue.number || inputs.issue }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch eligible issue to Devin
    runs-on: ubuntu-latest

    steps:
      - name: Resolve issue and guard dispatch
        id: guard
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('issue'))
              : context.payload.issue.number;
            const confirmLive = context.eventName === 'workflow_dispatch'
              ? core.getBooleanInput('confirm_live')
              : true;
            const { owner, repo } = context.repo;
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });
            const labels = issue.labels.map(label =>
              typeof label === 'string' ? label : label.name,
            );
            const has = name => labels.includes(name);
            const alreadyDispatched = (issue.body || '').includes('remediator:devin_session=');
            const eligible = has('devin:eligible') && has('state:detected');
            const shouldDispatch = confirmLive && eligible && !alreadyDispatched;

            core.setOutput('issue', String(issueNumber));
            core.setOutput('dispatch', shouldDispatch ? 'true' : 'false');
            core.notice(
              `issue #${issueNumber}: eligible=${eligible}; ` +
              `alreadyDispatched=${alreadyDispatched}; dispatch=${shouldDispatch}`,
            );

      - name: Checkout target repository
        if: steps.guard.outputs.dispatch == 'true'
        uses: actions/checkout@v4
        with:
          path: superset

      - name: Checkout remediator
        if: steps.guard.outputs.dispatch == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.REMEDIATOR_REPO }}
          token: ${{ secrets.REMEDIATOR_GITHUB_TOKEN }}
          path: remediator

      - name: Build remediator image
        if: steps.guard.outputs.dispatch == 'true'
        run: docker build -t superset-devin-remediator ./remediator

      - name: Dispatch Devin session
        if: steps.guard.outputs.dispatch == 'true'
        run: |
          mkdir -p out
          docker run --rm \
            -e GITHUB_TOKEN \
            -e GITHUB_OWNER \
            -e GITHUB_REPO \
            -e DEVIN_API_KEY \
            -e DEVIN_ORG_ID \
            -e DEVIN_REPO \
            -v "$PWD/superset:/workspace/superset" \
            -v "$PWD/out:/workspace/out" \
            superset-devin-remediator \
            dispatch \
            --repo-path /workspace/superset \
            --issue "${ISSUE_NUMBER}" \
            --confirm-live \
            --metrics-path /workspace/out/metrics.jsonl
        env:
          ISSUE_NUMBER: ${{ steps.guard.outputs.issue }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ vars.DEVIN_ORG_ID }}
          DEVIN_REPO: ${{ vars.DEVIN_REPO_URL }}

      - name: Upload dispatch metrics
        if: always() && steps.guard.outputs.dispatch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: devin-dispatch-${{ steps.guard.outputs.issue }}
          path: out/metrics.jsonl
          if-no-files-found: ignore
